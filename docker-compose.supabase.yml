version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autosurat_app
    restart: unless-stopped
    working_dir: /app
    environment:
      APP_NAME: "AutoSurat"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      APP_KEY: ${APP_KEY:-}

      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-6543}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_URL: ${DB_URL:-}
      DB_SSLMODE: ${DB_SSLMODE:-require}
      DB_EMULATE_PREPARES: ${DB_EMULATE_PREPARES:-true}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      MAIL_MAILER: log
    volumes:
      - ./:/app
      - /app/vendor
      - /app/node_modules
    networks:
      - autosurat_network
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: autosurat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - autosurat_network

  node:
    image: node:20-alpine
    container_name: autosurat_node
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - autosurat_network

networks:
  autosurat_network:
    driver: bridge

