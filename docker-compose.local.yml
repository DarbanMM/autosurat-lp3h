version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autosurat_app
    restart: unless-stopped
    working_dir: /app
    environment:
      APP_NAME: "AutoSurat"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      APP_KEY: ${APP_KEY:-}

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-autosurat}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      MAIL_MAILER: log
    volumes:
      - ./:/app
      - /app/vendor
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autosurat_network

  postgres:
    image: postgres:16-alpine
    container_name: autosurat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-autosurat}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autosurat_network

  nginx:
    image: nginx:alpine
    container_name: autosurat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - autosurat_network

  node:
    image: node:20-alpine
    container_name: autosurat_node
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - autosurat_network

volumes:
  postgres_data:

networks:
  autosurat_network:
    driver: bridge
